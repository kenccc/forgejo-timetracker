<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Planka Time Tracker</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #0c0b0a;
            color: #f0ece6;
            font-family: monospace;
        }
        .card {
            width: 100%;
            max-width: 360px;
            border: 1px solid #2a2620;
            border-radius: 8px;
            padding: 24px;
            background: #16120f;
        }
        h1 {
            margin: 0 0 16px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        label {
            display: block;
            font-size: 0.85rem;
            margin: 12px 0 6px;
            color: #c8c2b8;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #3d3830;
            border-radius: 4px;
            background: #2a2620;
            color: #f0ece6;
        }
        button {
            margin-top: 16px;
            width: 100%;
            padding: 10px;
            border: 1px solid #3282B8;
            border-radius: 4px;
            background: transparent;
            color: #3282B8;
            cursor: pointer;
        }
        .error {
            margin-top: 12px;
            color: #ff8f8f;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <form class="card" method="post">
        {% csrf_token %}
        <h1>Login Required</h1>
        <input type="hidden" name="next" value="{{ next|default:'/' }}">

        <label for="username">Username</label>
        <input id="username" name="username" type="text" required autocomplete="username">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password">

        <button type="submit">Log in</button>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </form>
</body>
</html>
