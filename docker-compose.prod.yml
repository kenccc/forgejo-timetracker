services:
  web:
    build: ./planka_tracker
    env_file: .env
    environment:
      - DB_PATH=/data/db.sqlite3
    volumes:
      - planka_data:/data
    networks:
      - internal
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - internal
    restart: unless-stopped

volumes:
  planka_data:
  caddy_data:
  caddy_config:

networks:
  internal:
